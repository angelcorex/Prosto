<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prosto</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0e0f12; overflow: hidden; }
      .wrap {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; gap: 16px; padding: 24px; box-sizing: border-box; text-align: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #e8e9ec; user-select: none; -webkit-user-select: none;
      }
      .logo { width: 64px; height: 64px; border-radius: 18px; opacity: 0.9; }
      h1 { font-size: 18px; font-weight: 600; margin: 4px 0 0; }
      p { font-size: 13.5px; line-height: 1.5; color: #9a9ba1; margin: 0; max-width: 22rem; }
      .btn {
        margin-top: 6px; appearance: none; border: 0; cursor: pointer;
        background: #fff; color: #111; font-weight: 600; font-size: 13.5px;
        padding: 10px 22px; border-radius: 12px; transition: opacity .15s;
      }
      .btn:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .hint { font-size: 12px; color: #6b6c73; }
      .spinner {
        width: 16px; height: 16px; border-radius: 50%; display: inline-block;
        vertical-align: -3px; margin-right: 6px;
        border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="prosto_logo.png" alt="Prosto" />
      <h1>Нет подключения к интернету</h1>
      <p>Не удалось связаться с Prosto. Проверьте соединение — приложение подключится автоматически, как только сеть вернётся.</p>
      <button id="retry" class="btn" type="button">Повторить</button>
      <div id="hint" class="hint"></div>
    </div>
    <script>
      (function () {
        var HOME = 'https://prosto.ink/feed';
        var PROBE = 'https://prosto.ink/favicon/prosto_logo.png';
        var btn = document.getElementById('retry');
        var hint = document.getElementById('hint');
        var checking = false;

        // Probe connectivity with a no-cors HEAD-like fetch. On success the site
        // is reachable again, so navigate into the app (server decides feed vs
        // sign-in). A cache-busting query avoids a stale cached response.
        function probe() {
          if (checking) return;
          checking = true;
          btn.disabled = true;
          hint.innerHTML = '<span class="spinner"></span>Проверяем соединение…';
          fetch(PROBE + '?t=' + Date.now(), { mode: 'no-cors', cache: 'no-store' })
            .then(function () { location.href = HOME; })
            .catch(function () {
              checking = false;
              btn.disabled = false;
              hint.textContent = 'Пока не удаётся подключиться.';
            });
        }

        btn.addEventListener('click', probe);
        // Auto-retry every 5s, plus react instantly if the OS reports it's back.
        setInterval(function () { if (!checking) probe(); }, 5000);
        window.addEventListener('online', probe);
      })();
    </script>
  </body>
</html>

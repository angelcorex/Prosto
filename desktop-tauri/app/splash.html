<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prosto</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0e0f12; overflow: hidden; }
      .wrap {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; gap: 18px; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #e8e9ec; user-select: none; -webkit-user-select: none;
      }
      .logo { width: 72px; height: 72px; border-radius: 20px; }
      .name { font-size: 18px; font-weight: 600; letter-spacing: 0.2px; }
      .spinner {
        width: 26px; height: 26px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.15); border-top-color: #6c8cff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="prosto_logo.png" alt="Prosto" />
      <div class="name">Prosto</div>
      <div class="spinner"></div>
    </div>
  </body>
</html>
